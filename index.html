<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="習慣を週ごとにトラッキングするアプリ">
  <title>Weekly Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Weekly Tracker</h1>
      <nav class="week-nav" aria-label="週の移動">
        <button id="prev-week" aria-label="前の週">&#8249;</button>
        <span id="week-label"></span>
        <button id="next-week" aria-label="次の週">&#8250;</button>
        <button id="today-btn">今週</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="tracker-card">
      <div class="table-wrap">
        <table id="tracker-table">
          <thead>
            <tr id="thead-row">
              <th class="habit-col">習慣</th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
        <div id="empty-state" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p>習慣を追加してトラッキングを始めましょう</p>
          <small>下のフォームから習慣を入力してください</small>
        </div>
      </div>
    </div>

    <div class="add-form-wrap">
      <form id="add-form">
        <input
          type="text"
          id="habit-input"
          placeholder="新しい習慣を入力... (例: 読書、運動、瞑想)"
          maxlength="50"
          autocomplete="off"
          autofocus
        >
        <button type="submit">追加</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
