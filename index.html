<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="習慣を週ごとにトラッキングするアプリ">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weekly">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Weekly Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Weekly Tracker</h1>
      <nav class="week-nav" id="week-nav" aria-label="週の移動">
        <button id="prev-week" aria-label="前の週">&#8249;</button>
        <span id="week-label"></span>
        <button id="next-week" aria-label="次の週">&#8250;</button>
        <button id="today-btn">今週</button>
      </nav>
    </div>
    <div class="header-tabs" role="tablist">
      <button class="htab is-active" id="tab-tracker" role="tab" aria-selected="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        トラッカー
      </button>
      <button class="htab" id="tab-stats" role="tab" aria-selected="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        統計
      </button>
    </div>
  </header>

  <main>
    <!-- ── トラッカービュー ── -->
    <div id="tracker-view">
      <div class="tracker-card">
        <div class="table-wrap">
          <table id="tracker-table">
            <thead>
              <tr id="thead-row">
                <th class="habit-col">習慣</th>
              </tr>
            </thead>
            <tbody id="tracker-body"></tbody>
          </table>
          <div id="empty-state" class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <p>習慣を追加してトラッキングを始めましょう</p>
            <small>下のフォームから習慣を入力してください</small>
          </div>
        </div>
      </div>

      <div class="add-form-wrap">
        <form id="add-form">
          <input
            type="text"
            id="habit-input"
            placeholder="新しい習慣を入力... (例: 読書、運動、瞑想)"
            maxlength="50"
            autocomplete="off"
          >
          <button type="submit">追加</button>
        </form>
      </div>

      <div class="toolbar">
        <button id="export-btn" class="tool-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          エクスポート
        </button>
        <label class="tool-btn" id="import-label" role="button" tabindex="0">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 5 17 10"/>
            <line x1="12" y1="5" x2="12" y2="15"/>
          </svg>
          インポート
          <input type="file" id="import-input" accept=".json">
        </label>
      </div>
    </div>

    <!-- ── 統計ビュー ── -->
    <div id="stats-view" hidden></div>
  </main>

  <!-- 習慣編集モーダル -->
  <div id="edit-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-hd">
        <h2 id="modal-title">習慣を編集</h2>
        <button class="modal-close" id="modal-close" aria-label="閉じる">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M1 1l14 14M15 1L1 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="edit-name" class="field-label">名前</label>
          <input type="text" id="edit-name" class="field-input" maxlength="50" autocomplete="off">
        </div>
        <div class="field">
          <span class="field-label">カラー</span>
          <div class="color-swatches" id="color-swatches" role="group" aria-label="カラー選択"></div>
        </div>
        <div class="field">
          <span class="field-label">週の目標日数</span>
          <div class="goal-stepper">
            <button type="button" class="step-btn" id="goal-dec" aria-label="減らす">−</button>
            <span class="goal-val">
              <strong id="goal-display">7</strong>
              <span class="goal-unit">日/週</span>
            </span>
            <button type="button" class="step-btn" id="goal-inc" aria-label="増やす">＋</button>
          </div>
        </div>
      </div>
      <div class="modal-ft">
        <button type="button" class="btn-cancel" id="modal-cancel">キャンセル</button>
        <button type="button" class="btn-save" id="modal-save">保存</button>
      </div>
    </div>
  </div>

  <!-- iOS ホーム画面追加バナー -->
  <div id="ios-banner" class="ios-banner" hidden aria-live="polite">
    <button class="ios-banner-close" id="ios-banner-close" aria-label="閉じる">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="ios-banner-body">
      <svg class="ios-banner-icon" viewBox="0 0 512 512" width="44" height="44" aria-hidden="true">
        <defs>
          <linearGradient id="ib" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="100%" stop-color="#3730a3"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="114" fill="url(#ib)"/>
        <circle cx="143" cy="190" r="44" fill="white" opacity="0.9"/>
        <circle cx="256" cy="190" r="44" fill="white" opacity="0.9"/>
        <circle cx="369" cy="190" r="44" fill="white" opacity="0.9"/>
        <circle cx="143" cy="322" r="44" fill="none" stroke="white" stroke-width="7" opacity="0.4"/>
        <circle cx="256" cy="322" r="44" fill="white" opacity="0.9"/>
        <circle cx="369" cy="322" r="44" fill="white" opacity="0.9"/>
      </svg>
      <div class="ios-banner-text">
        <strong>ホーム画面に追加</strong>
        <p>
          Safari の
          <span class="ios-share-icon" aria-label="共有ボタン">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/>
              <polyline points="16 6 12 2 8 6"/>
              <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
          </span>
          をタップして「ホーム画面に追加」を選択
        </p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
